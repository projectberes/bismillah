<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Project – Project Beres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/src/img/logo.ico">
  <link rel="icon" type="image/webp" href="/src/img/logo.webp">
  
  <!-- CSS Kustom Terpisah -->
  <link rel="stylesheet" href="/src/style.css">
  
  <style>
    /* Custom CSS khusus untuk Halaman Detail */
    .detail-hero {
      min-height: calc(100vh - 80px);
      padding: 140px 5% 80px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    
    .detail-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(21, 29, 48, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 48px;
      position: relative;
      box-shadow: var(--shadow-lg);
    }
    
    @media (max-width: 992px) {
      .detail-container {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 32px 24px;
      }
    }
    
    .detail-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }
    
    .detail-visual-wrapper {
      width: 200px;
      height: 200px;
      background: #000000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 32px rgba(16, 185, 129, 0.25);
      margin-bottom: 24px;
      position: relative;
      animation: floatVisual 6s ease-in-out infinite;
    }
    
    @keyframes floatVisual {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
    }
    
    .detail-visual-icon {
      font-size: 84px;
    }
    
    .detail-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s, transform 0.2s;
      margin-bottom: 32px;
      align-self: flex-start;
    }
    
    .detail-back-btn:hover {
      color: var(--green);
      transform: translateX(-4px);
    }
    
    .detail-right {
      display: flex;
      flex-direction: column;
    }
    
    .detail-tag {
      align-self: flex-start;
      background: rgba(16, 185, 129, 0.12);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    
    .detail-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--white-text);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    
    .detail-tech-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .detail-tech-chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    
    .detail-desc {
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    
    .detail-features-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }
    
    .detail-features-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--white-text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .detail-features-list {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    @media (max-width: 576px) {
      .detail-features-list {
        grid-template-columns: 1fr;
      }
    }
    
    .detail-features-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    
    .detail-features-item::before {
      content: '✓';
      color: var(--green);
      font-weight: 900;
      font-size: 1rem;
      flex-shrink: 0;
    }
    
    .detail-cta-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--amber);
      color: var(--white-text);
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    
    @media (max-width: 600px) {
      .detail-hero {
        padding: 100px 4% 40px;
      }
      .detail-container {
        padding: 24px 16px;
        gap: 20px;
      }
      .detail-visual-wrapper {
        width: 140px;
        height: 140px;
        margin-bottom: 16px;
      }
      .detail-visual-icon {
        font-size: 56px;
      }
      .detail-title {
        font-size: 1.8rem;
        margin-bottom: 12px;
      }
      .detail-desc {
        font-size: 0.95rem;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .detail-features-card {
        padding: 16px;
        margin-bottom: 20px;
      }
      .detail-features-title {
        font-size: 1rem;
        margin-bottom: 12px;
      }
      .detail-features-list {
        gap: 8px;
      }
      .detail-back-btn {
        margin-bottom: 20px;
      }
      .detail-cta-btn {
        width: 100%;
        justify-content: center;
      }
    }
    
    .detail-cta-btn:hover {
      background: var(--amber-dark);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(37,99,235,0.4);
    }
  </style>
</head>
<body>

  <!-- load navbar secara modular -->
  <load src="src/parts/cursor.html" />
  <load src="src/parts/navbar.html" />

  <div class="detail-hero">
    <!-- Grid Latar Belakang Cyber -->
    <div class="hero-grid" style="opacity: 0.6;"></div>
    
    <div class="detail-container">
      
      <!-- Sisi Kiri: Visual & Back Button -->
      <div class="detail-left reveal-left">
        <a href="index.html" class="detail-back-btn">
          <span>←</span> Kembali ke Beranda
        </a>
        
        <div class="detail-visual-wrapper" id="projectVisualWrapper">
          <div class="detail-visual-icon" id="projectIcon">🚀</div>
        </div>
      </div>
      
      <!-- Sisi Kanan: Konten Informasi Project -->
      <div class="detail-right reveal-right">
        <div class="detail-tag" id="projectTag">Category</div>
        <h1 class="detail-title" id="projectTitle">Nama Project</h1>
        
        <!-- Tech Stack Chips -->
        <div class="detail-tech-stack" id="projectTechStack">
          <!-- Dinamis -->
        </div>
        
        <p class="detail-desc" id="projectDesc">
          Loading deskripsi lengkap project...
        </p>
        
        <!-- Card Fitur Utama -->
        <div class="detail-features-card">
          <div class="detail-features-title">
            <span>🛠️</span> Fitur & Kelebihan Utama:
          </div>
          <ul class="detail-features-list" id="projectFeaturesList">
            <!-- Dinamis -->
          </ul>
        </div>
        
        <!-- CTA Diskusi WhatsApp -->
        <a href="#" class="detail-cta-btn" id="projectCta">
          Diskusikan Project Seperti Ini <span>↗</span>
        </a>
      </div>
      
    </div>
  </div>

  <!-- load footer secara modular -->
  <load src="src/parts/footer.html" />

  <script type="module" src="/src/main.js"></script>

  <!-- Database & Router Project -->
  <script>

        tech: ["HTML5", "CSS3", "ScrollReveal", "Vanilla JS"],
        features: ["Interactive Floating Animations", "Skema Warna Cyber Dark Mode", "Showcase Project Grid", "Downloadable Resume Button"],

        title: "WordPress UMKM Desa",

      },
      "laravel-face-detect": {

        icon: "📸",
        tag: "Laravel Web App",
        desc: "Aplikasi absensi dan autentikasi modern berbasis framework Laravel. Sistem ini dilengkapi dengan modul kamera absensi real-time yang memanfaatkan API Deteksi Wajah (Face Detection) untuk memverifikasi wajah karyawan atau mahasiswa secara otomatis sebelum data kehadiran disimpan ke dalam database.",

      },
      "python-tugas-sekolah": {

        waMsg: "Halo Project Beres, saya tertarik untuk membuat project seperti Download Video/MP3 YT & Sosmed."
      },
      "webp-converter": {
        title: "Convert Gambar ke WebP",
        icon: "🖼️",
        tag: "Utility Tool",
        desc: "Alat bantu utilitas batch-system Python yang dirancang untuk mengonversi ratusan gambar berformat JPG, PNG, atau BMP menjadi format modern WebP secara sekaligus (bulk conversion) guna mengurangi ukuran penyimpanan secara drastis hingga 80% tanpa merusak kualitas visual.",
        tech: ["Python", "Pillow (PIL)", "Batch File Processing", "Tkinter GUI"],
        features: ["Bulk Image Conversion", "Pengurangan Ukuran Berkas hingga 80%", "Antarmuka Drop-and-Click Sederhana", "Kecepatan Konversi Super Tinggi"],

      },
      "custom-request": {
        title: "Dan Lain-lain (Custom Request)",
        icon: "💡",
        tag: "Custom Request",
        desc: "Kami menerima tantangan pembuatan sistem, program, aplikasi, maupun otomatisasi skrip kustom di luar daftar di atas. Ceritakan ide proyek impian Anda, mulai dari sistem e-commerce khusus, dashboard manajemen inventaris, sistem scraping data, bot otomatisasi chat, hingga integrasi API pihak ketiga lainnya.",
        tech: ["NodeJS / Python / PHP", "React / Vue / Laravel", "Database SQL / NoSQL", "Custom Integrations"],
        features: ["Konsultasi Arsitektur Sistem Gratis", "Desain Sistem UI/UX Eksklusif", "Pengembangan Agile & Transparan", "Jaminan Maintenance & Dukungan 24 Jam"],

    };

    // Fungsi Render Halaman
    function renderProjectDetail() {
      // Ambil parameter id dari URL
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id') || 'landing-page-profile'; // fallback
      
      const data = PROJECTS_DATA[projectId] || PROJECTS_DATA['landing-page-profile'];
      
      // Update Tab Title
      document.title = `${data.title} – Project Beres`;
      
      // Update DOM
      document.getElementById('projectIcon').textContent = data.icon;
      document.getElementById('projectTag').textContent = data.tag;
      document.getElementById('projectTitle').textContent = data.title;
      document.getElementById('projectDesc').textContent = data.desc;
      
      // Render Tech Stack
      const techStackContainer = document.getElementById('projectTechStack');
      techStackContainer.innerHTML = '';
      data.tech.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'detail-tech-chip';
        chip.textContent = t;
        techStackContainer.appendChild(chip);
      });
      
      // Render Features
      const featuresList = document.getElementById('projectFeaturesList');
      featuresList.innerHTML = '';
      data.features.forEach(f => {
        const li = document.createElement('li');
        li.className = 'detail-features-item';
        li.textContent = f;
        featuresList.appendChild(li);
      });
      
      // Update WhatsApp Link
      const waNumber = "62895610842880"; // nomor WA Project Beres
      const encodedMsg = encodeURIComponent(data.waMsg);
      document.getElementById('projectCta').href = `https://wa.me/${waNumber}?text=${encodedMsg}`;
      
      // Atur visual glow border bertema biru/hijau secara bergantian
      const wrapper = document.getElementById('projectVisualWrapper');
      if (data.tag === 'Web Development') {
        wrapper.style.borderColor = 'rgba(16, 185, 129, 0.4)';
        wrapper.style.boxShadow = '0 0 32px rgba(16, 185, 129, 0.25)';
      } else {
        wrapper.style.borderColor = 'rgba(37, 99, 235, 0.4)';
        wrapper.style.boxShadow = '0 0 32px rgba(37, 99, 235, 0.25)';
      }
    }

    // Jalankan render saat load
    window.addEventListener('DOMContentLoaded', renderProjectDetail);
  </script>

</body>
</html>
